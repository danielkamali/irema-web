<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Irema — Rwanda's trusted platform for honest, transparent business reviews. Read and share reviews about businesses across East Africa." />
    <meta name="theme-color" content="#1ECAB8" />
    <meta property="og:title" content="Irema — Trusted Business Reviews" />
    <meta property="og:description" content="Read and share honest reviews about businesses across Rwanda and East Africa." />
    <title>Irema — Trusted Business Reviews</title>
    <!-- Favicon SVG inline as data URI -->
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.svg" />
    <script>
      // Apply saved theme BEFORE React mounts so there's no flash of the
      // wrong colour scheme. Defaults to 'light' when nothing is saved.
      (function () {
        try {
          var saved = localStorage.getItem('irema_theme');
          var theme = saved === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
